name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
    steps:
      - uses: actions/checkout@v7
      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          staging="id3tools-${tag}-${{ matrix.target }}"
          mkdir "$staging"
          for bin in id3tag id3show id3export id3cli-gen; do
            cp "target/${{ matrix.target }}/release/${bin}" "$staging/"
          done
          cp README.md LICENSE "$staging/" 2>/dev/null || true
          tar czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $staging = "id3tools-${tag}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging
          foreach ($bin in @("id3tag", "id3show", "id3export", "id3cli-gen")) {
            Copy-Item "target/${{ matrix.target }}/release/${bin}.exe" "$staging/"
          }
          Copy-Item "README.md" "$staging/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" "$staging/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$staging/*" -DestinationPath "${staging}.zip"
          echo "ASSET=${staging}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generateReleaseNotes: true
          artifacts: "artifacts/*"
