pull_request_rules:
  - name: Automatic approve for Dependabot pull requests
    conditions:
      - author=dependabot[bot]
    actions:
      review:
        type: APPROVE

  - name: Automatic merge for Dependabot pull requests
    conditions:
      - author=dependabot[bot]
      - check-success=Rustfmt
      - check-success=Clippy
      - "check-success=Test (ubuntu-latest)"
      - "check-success=Test (macos-latest)"
    actions:
      merge:
        method: squash

  - name: Automatic update to the main branch for pull requests
    conditions:
      - -conflict
      - -draft
      - -author=dependabot[bot]
    actions:
      update:
